name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: engram
          POSTGRES_PASSWORD: engram
          POSTGRES_DB: engram_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U engram"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://engram:engram@localhost:5432/engram_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Build MCP server
        run: cd mcp-server && npm run build

      - name: Enable PostgreSQL extensions
        run: |
          PGPASSWORD=engram psql -h localhost -U engram -d engram_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=engram psql -h localhost -U engram -d engram_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Install schema
        run: PGPASSWORD=engram psql -h localhost -U engram -d engram_test -f schema/schema.sql

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check MCP server compiles
        run: cd mcp-server && npm ci && npm run build
