<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative neural dots (left side) -->
  <circle cx="40" cy="60" r="4" fill="url(#accent)" opacity="0.4" filter="url(#softglow)"/>
  <circle cx="65" cy="90" r="3" fill="url(#accent)" opacity="0.3"/>
  <circle cx="30" cy="110" r="2.5" fill="url(#accent)" opacity="0.25"/>
  <circle cx="80" cy="130" r="3.5" fill="url(#accent)" opacity="0.35"/>
  <circle cx="55" cy="150" r="2" fill="url(#accent)" opacity="0.2"/>
  <line x1="40" y1="60" x2="65" y2="90" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
  <line x1="65" y1="90" x2="30" y2="110" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  <line x1="65" y1="90" x2="80" y2="130" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="130" x2="55" y2="150" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>

  <!-- Decorative neural dots (right side) -->
  <circle cx="740" cy="50" r="3" fill="url(#accent)" opacity="0.3"/>
  <circle cx="760" cy="85" r="4" fill="url(#accent)" opacity="0.35" filter="url(#softglow)"/>
  <circle cx="720" cy="120" r="2.5" fill="url(#accent)" opacity="0.25"/>
  <circle cx="750" cy="150" r="3" fill="url(#accent)" opacity="0.3"/>
  <line x1="740" y1="50" x2="760" y2="85" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
  <line x1="760" y1="85" x2="720" y2="120" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  <line x1="720" y1="120" x2="750" y2="150" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>

  <!-- Logo mark (mini neural network) -->
  <g transform="translate(130, 100)">
    <circle cx="0" cy="-20" r="7" fill="url(#accent)" filter="url(#glow)" opacity="0.95"/>
    <circle cx="-22" cy="5" r="5" fill="url(#accent)" filter="url(#softglow)" opacity="0.75"/>
    <circle cx="22" cy="5" r="5" fill="url(#accent)" filter="url(#softglow)" opacity="0.75"/>
    <circle cx="-10" cy="25" r="4" fill="url(#accent)" opacity="0.6"/>
    <circle cx="10" cy="25" r="4" fill="url(#accent)" opacity="0.6"/>
    <line x1="0" y1="-20" x2="-22" y2="5" stroke="url(#textglow)" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-20" x2="22" y2="5" stroke="url(#textglow)" stroke-width="1" opacity="0.4"/>
    <line x1="-22" y1="5" x2="-10" y2="25" stroke="url(#textglow)" stroke-width="0.8" opacity="0.3"/>
    <line x1="22" y1="5" x2="10" y2="25" stroke="url(#textglow)" stroke-width="0.8" opacity="0.3"/>
    <line x1="-10" y1="25" x2="10" y2="25" stroke="url(#textglow)" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="-20" r="3" fill="#e9d5ff" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="200" y="85" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#textglow)" letter-spacing="4">Engram</text>

  <!-- Tagline -->
  <text x="200" y="120" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">Persistent memory for AI agents who refuse to forget</text>

  <!-- Stats line -->
  <text x="200" y="155" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#64748b">
    <tspan fill="#c084fc">250K+</tspan> memories
    <tspan dx="12" fill="#475569">|</tspan>
    <tspan dx="12" fill="#818cf8">100</tspan> tests
    <tspan dx="12" fill="#475569">|</tspan>
    <tspan dx="12" fill="#60a5fa">Mac mini M1</tspan>
    <tspan dx="12" fill="#475569">|</tspan>
    <tspan dx="12" fill="#c084fc">&lt;1ms</tspan> scoring
  </text>

  <!-- Bottom accent line -->
  <rect x="200" y="172" width="400" height="1.5" fill="url(#accent)" opacity="0.3" rx="1"/>
</svg>
