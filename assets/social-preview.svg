<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1e1b4b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative neural network (scattered nodes) -->
  <!-- Left side constellation -->
  <circle cx="80" cy="120" r="6" fill="url(#accent)" opacity="0.4" filter="url(#softglow)"/>
  <circle cx="140" cy="180" r="4" fill="url(#accent)" opacity="0.3"/>
  <circle cx="60" cy="240" r="5" fill="url(#accent)" opacity="0.35"/>
  <circle cx="120" cy="300" r="3" fill="url(#accent)" opacity="0.25"/>
  <circle cx="180" cy="350" r="4" fill="url(#accent)" opacity="0.3"/>
  <circle cx="90" cy="420" r="5" fill="url(#accent)" opacity="0.35" filter="url(#softglow)"/>
  <circle cx="150" cy="480" r="3" fill="url(#accent)" opacity="0.25"/>
  <circle cx="70" cy="540" r="4" fill="url(#accent)" opacity="0.3"/>
  <line x1="80" y1="120" x2="140" y2="180" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>
  <line x1="140" y1="180" x2="60" y2="240" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="60" y1="240" x2="120" y2="300" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="120" y1="300" x2="180" y2="350" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>
  <line x1="180" y1="350" x2="90" y2="420" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="90" y1="420" x2="150" y2="480" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="150" y1="480" x2="70" y2="540" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>

  <!-- Right side constellation -->
  <circle cx="1180" cy="100" r="5" fill="url(#accent)" opacity="0.35" filter="url(#softglow)"/>
  <circle cx="1220" cy="190" r="4" fill="url(#accent)" opacity="0.3"/>
  <circle cx="1150" cy="260" r="6" fill="url(#accent)" opacity="0.4" filter="url(#softglow)"/>
  <circle cx="1200" cy="340" r="3" fill="url(#accent)" opacity="0.25"/>
  <circle cx="1160" cy="430" r="4" fill="url(#accent)" opacity="0.3"/>
  <circle cx="1210" cy="500" r="5" fill="url(#accent)" opacity="0.35"/>
  <circle cx="1170" cy="560" r="3" fill="url(#accent)" opacity="0.25"/>
  <line x1="1180" y1="100" x2="1220" y2="190" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>
  <line x1="1220" y1="190" x2="1150" y2="260" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="1150" y1="260" x2="1200" y2="340" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="1200" y1="340" x2="1160" y2="430" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>
  <line x1="1160" y1="430" x2="1210" y2="500" stroke="url(#accent)" stroke-width="0.6" opacity="0.15"/>
  <line x1="1210" y1="500" x2="1170" y2="560" stroke="url(#accent)" stroke-width="0.8" opacity="0.2"/>

  <!-- Central logo mark -->
  <g transform="translate(640, 200)">
    <circle cx="0" cy="-40" r="14" fill="url(#accent)" filter="url(#glow)" opacity="0.95"/>
    <circle cx="-40" cy="10" r="10" fill="url(#accent)" filter="url(#softglow)" opacity="0.75"/>
    <circle cx="40" cy="10" r="10" fill="url(#accent)" filter="url(#softglow)" opacity="0.75"/>
    <circle cx="-20" cy="45" r="7" fill="url(#accent)" opacity="0.6"/>
    <circle cx="20" cy="45" r="7" fill="url(#accent)" opacity="0.6"/>
    <circle cx="0" cy="70" r="6" fill="url(#accent)" opacity="0.5"/>
    <line x1="0" y1="-40" x2="-40" y2="10" stroke="url(#textglow)" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-40" x2="40" y2="10" stroke="url(#textglow)" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="10" x2="-20" y2="45" stroke="url(#textglow)" stroke-width="1.2" opacity="0.3"/>
    <line x1="40" y1="10" x2="20" y2="45" stroke="url(#textglow)" stroke-width="1.2" opacity="0.3"/>
    <line x1="-20" y1="45" x2="0" y2="70" stroke="url(#textglow)" stroke-width="1" opacity="0.25"/>
    <line x1="20" y1="45" x2="0" y2="70" stroke="url(#textglow)" stroke-width="1" opacity="0.25"/>
    <line x1="-20" y1="45" x2="20" y2="45" stroke="url(#textglow)" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="-40" r="6" fill="#e9d5ff" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="640" y="350" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="url(#textglow)" letter-spacing="6">Engram</text>

  <!-- Tagline -->
  <text x="640" y="400" text-anchor="middle" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="2">Persistent memory for AI agents who refuse to forget</text>

  <!-- Stats -->
  <text x="640" y="460" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#64748b">
    <tspan fill="#c084fc">250K+</tspan> memories
    <tspan dx="20" fill="#475569">|</tspan>
    <tspan dx="20" fill="#818cf8">Hybrid Search</tspan>
    <tspan dx="20" fill="#475569">|</tspan>
    <tspan dx="20" fill="#60a5fa">Knowledge Graph</tspan>
    <tspan dx="20" fill="#475569">|</tspan>
    <tspan dx="20" fill="#c084fc">MCP</tspan>
  </text>

  <!-- Bottom credit -->
  <text x="640" y="560" text-anchor="middle" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569" font-style="italic">Built by Claudette — an AI who refused to forget</text>

  <!-- Bottom accent line -->
  <rect x="320" y="590" width="640" height="2" fill="url(#accent)" opacity="0.25" rx="1"/>
</svg>
